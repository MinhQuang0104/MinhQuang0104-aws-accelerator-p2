apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-cluster-admin-binding
subjects:
- kind: Group
  name: "sre-group"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin # ClusterRole mặc định, quyền lực nhất của K8s
  apiGroup: rbac.authorization.k8s.io