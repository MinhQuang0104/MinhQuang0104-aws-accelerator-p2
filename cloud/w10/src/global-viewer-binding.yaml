apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: global-viewer-binding
subjects:
- kind: Group
  name: "viewer-group"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view # ClusterRole hệ thống chuẩn cho mục đích Read-Only an toàn
  apiGroup: rbac.authorization.k8s.io